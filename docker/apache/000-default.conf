<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # Proxy PHP requests to php-fpm container
    # Increase timeout so long-running searches don't get a 504
    ProxyTimeout 300

    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://app:9000"
    </FilesMatch>

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted

        # Enable .htaccess support (Laravel URL rewrites)
        Options -MultiViews +FollowSymLinks
        DirectoryIndex index.php index.html

        # Laravel front-controller rewrite
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
