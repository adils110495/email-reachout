; Custom PHP configuration for AI Client Finder

[PHP]
; Increase limits for scraping operations
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
post_max_size = 16M
upload_max_filesize = 16M

; Error reporting (set to E_ALL in local, reduce in production)
error_reporting = E_ALL
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log

; Session
session.gc_maxlifetime = 7200
session.cookie_httponly = 1

; OPcache (improves performance)
[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; Date
date.timezone = UTC
