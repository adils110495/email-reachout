services:

  # ──────────────────────────────────────────────────────────────
  # PHP-FPM application container
  # ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ai_client_finder_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  # ──────────────────────────────────────────────────────────────
  # Apache web server (proxy to PHP-FPM)
  # ──────────────────────────────────────────────────────────────
  webserver:
    image: httpd:2.4
    container_name: ai_client_finder_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/apache/000-default.conf:/usr/local/apache2/conf/extra/app.conf
      - ./docker/apache/httpd-proxy.conf:/usr/local/apache2/conf/extra/httpd-proxy.conf
    depends_on:
      - app
    networks:
      - app_network
    command: >
      sh -c "echo 'Include conf/extra/httpd-proxy.conf' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'Include conf/extra/app.conf' >> /usr/local/apache2/conf/httpd.conf &&
             httpd-foreground"

  # ──────────────────────────────────────────────────────────────
  # MySQL 8
  # ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ai_client_finder_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cold_email_db}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ──────────────────────────────────────────────────────────────
  # Redis (queue + cache)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_client_finder_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # ──────────────────────────────────────────────────────────────
  # phpMyAdmin — MySQL web UI
  # ──────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: ai_client_finder_pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-sail}
      PMA_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

  # ──────────────────────────────────────────────────────────────
  # Queue worker (processes the "emails" queue)
  # ──────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ai_client_finder_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: php artisan queue:work redis --queue=emails,default --tries=3 --backoff=30 --sleep=3 --timeout=90
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  app_network:
    driver: bridge
